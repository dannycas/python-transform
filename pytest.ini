[pytest]
# Pytest configuration for python-transform

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbosity
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage
[coverage:run]
source = .
omit = 
    tests/*
    setup.py
    run_tests.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

precision = 2

# Markers
markers =
    unit: unit tests
    integration: integration tests
    slow: slow tests
    requires_tesseract: tests that require Tesseract-OCR
